<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイムカード</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-background-primary:#ffffff;--color-background-secondary:#f4f4f3;--color-background-tertiary:#eae9e3;
  --color-background-info:#daeaf8;--color-background-success:#dff0d0;--color-background-warning:#faeeda;--color-background-danger:#fde8e8;
  --color-text-primary:#1a1915;--color-text-secondary:#6b6966;--color-text-tertiary:#b0ada8;
  --color-text-info:#0c447c;--color-text-success:#27500a;--color-text-warning:#7c4a0a;--color-text-danger:#8b0000;
  --color-border-secondary:#d3d1c7;--color-border-tertiary:#e2e0da;--color-border-danger:#f5c0c0;
  --border-radius-md:6px;--border-radius-lg:10px;--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--font-mono:'Courier New',monospace;
}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);min-height:100vh}
.app{min-height:100vh}
.nav{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.nav-title{font-size:15px;font-weight:500;color:var(--color-text-primary);display:flex;align-items:center;gap:8px}
.nav-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{padding:3px 9px;border-radius:var(--border-radius-md);font-size:11px;font-weight:500}
.badge-admin{background:var(--color-background-info);color:var(--color-text-info)}
.badge-staff{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.tab-bar{display:flex;gap:3px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:3px;flex-wrap:wrap}
.tab{padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--color-text-secondary);font-family:var(--font-sans)}
.tab.active{background:var(--color-background-primary);color:var(--color-text-primary);font-weight:500;border:0.5px solid var(--color-border-tertiary)}
.content{padding:16px 20px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:12px}
.btn{padding:6px 13px;border-radius:var(--border-radius-md);font-size:13px;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans);display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--color-background-secondary)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-primary{background:#185FA5;color:#E6F1FB;border-color:#185FA5}
.btn-primary:hover{background:#0C447C}
.btn-success{background:#3B6D11;color:#EAF3DE;border-color:#3B6D11}
.btn-success:hover{background:#27500A}
.btn-danger{background:var(--color-background-danger);color:var(--color-text-danger);border-color:var(--color-border-danger)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat4{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;text-align:center}
.stat-label{font-size:10px;color:var(--color-text-secondary);margin-bottom:3px;line-height:1.3}
.stat-val{font-size:17px;font-weight:500;color:var(--color-text-primary)}
.stat-sub{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
.punch-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.punch-btn{width:100%;padding:14px;font-size:14px;font-weight:500;border-radius:var(--border-radius-lg);cursor:pointer;border:none;font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;gap:7px}
.punch-btn:hover{opacity:0.88}
.punch-btn:disabled{opacity:0.32;cursor:not-allowed}
.p-in{background:#185FA5;color:#E6F1FB}
.p-out{background:#3B6D11;color:#EAF3DE}
.p-brk{background:#854F0B;color:#FAEEDA}
.p-res{background:#533AB7;color:#EEEDFE}
.time-big{font-size:30px;font-weight:500;text-align:center;padding:10px 0 4px;color:var(--color-text-primary)}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.dot-in{background:#639922}.dot-brk{background:#BA7517}.dot-off{background:#888780}.dot-night{background:#533AB7}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{text-align:left;padding:7px 8px;color:var(--color-text-secondary);font-weight:500;border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap}
.tbl td{padding:7px 8px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--color-background-secondary)}
.night-badge{background:#EEEDFE;color:#3C3489;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:3px;font-weight:500}
.notice{padding:9px 13px;border-radius:var(--border-radius-md);font-size:13px;margin-bottom:10px}
.n-ok{background:var(--color-background-success);color:var(--color-text-success)}
.n-info{background:var(--color-background-info);color:var(--color-text-info)}
.n-err{background:var(--color-background-danger);color:var(--color-text-danger)}
.n-warn{background:var(--color-background-warning);color:var(--color-text-warning)}
.sec{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:9px}
.ifield{width:100%;padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;font-family:var(--font-sans)}
label{font-size:11px;color:var(--color-text-secondary);display:block;margin-bottom:3px}
.chip{padding:4px 11px;border-radius:20px;font-size:12px;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary)}
.chip.on{background:#185FA5;color:#E6F1FB;border-color:#185FA5}
.site-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:10px}
.rule-box{background:var(--color-background-info);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--color-text-info);line-height:1.7}
.bar-wrap{display:flex;align-items:flex-end;gap:2px;height:60px;margin:6px 0 2px}
.bar-item{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0}
.bar-label{font-size:8px;color:var(--color-text-secondary);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;text-align:center}
/* マトリクス */
.matrix-wrap{overflow-x:auto;overflow-y:auto;max-height:420px;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary)}
.matrix-tbl{border-collapse:collapse;font-size:11px;min-width:max-content}
.matrix-tbl th{position:sticky;background:var(--color-background-secondary);z-index:2;padding:0;border:0.5px solid var(--color-border-tertiary)}
.matrix-tbl td{border:0.5px solid var(--color-border-tertiary);padding:0;text-align:center;min-width:36px;height:30px}
.col-name{position:sticky;left:0;z-index:3;background:var(--color-background-secondary) !important;min-width:90px;max-width:110px;text-align:left !important;padding:5px 8px !important;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-header{position:sticky;top:0;z-index:4}
.corner{position:sticky;left:0;top:0;z-index:10;background:var(--color-background-secondary) !important}
.matrix-cell{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:10px;font-weight:500}
.cell-empty{color:var(--color-text-tertiary)}
.cell-normal{background:#E6F1FB;color:#0C447C}
.cell-night{background:#EEEDFE;color:#3C3489}
.cell-holiday{background:var(--color-background-secondary);color:var(--color-text-tertiary)}
.row-total td{background:var(--color-background-secondary) !important;font-weight:500}
.col-total{background:var(--color-background-secondary) !important;font-weight:500;min-width:44px}
.th-date{min-width:36px;height:46px;vertical-align:bottom;padding:4px 2px !important;text-align:center !important;font-weight:400;line-height:1.3}
.th-date.weekend{color:var(--color-text-danger)}
.th-date.today-col{background:var(--color-background-info) !important;color:var(--color-text-info) !important;font-weight:600}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary)}
.leg-box{width:14px;height:14px;border-radius:3px}
/* 同期インジケータ */
.sync-bar{position:fixed;bottom:16px;right:16px;background:#185FA5;color:#E6F1FB;padding:8px 14px;border-radius:var(--border-radius-lg);font-size:12px;display:none;align-items:center;gap:6px;z-index:999;box-shadow:0 2px 12px rgba(0,0,0,0.15)}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:12px}
.spinner{width:32px;height:32px;border:3px solid var(--color-border-tertiary);border-top-color:#185FA5;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app" id="app">

<!-- ローディング -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--color-text-secondary)">データを読み込み中...</div>
</div>

<!-- 同期インジケータ -->
<div class="sync-bar" id="sync-bar">
  <i class="ti ti-cloud-upload"></i><span id="sync-msg">保存中...</span>
</div>

<!-- ログイン -->
<div id="login-screen" style="display:none">
  <div style="max-width:360px;margin:46px auto;padding:0 20px">
    <div style="text-align:center;margin-bottom:22px">
      <i class="ti ti-building" style="font-size:32px;color:#185FA5"></i>
      <div style="font-size:18px;font-weight:500;margin-top:6px;color:var(--color-text-primary)">タイムカード</div>
      <div style="font-size:11px;color:var(--color-text-secondary);margin-top:3px">1ヶ月単位変形労働時間制対応</div>
    </div>
    <div class="card">
      <div id="login-err" class="notice n-err" style="display:none"></div>
      <div style="margin-bottom:11px"><label>事業所</label><select id="ls-site" class="ifield" style="cursor:pointer" onchange="onLsSite()"></select></div>
      <div style="margin-bottom:11px"><label>職員</label><select id="ls-user" class="ifield" style="cursor:pointer"></select></div>
      <div style="margin-bottom:14px"><label>パスワード</label><input type="password" id="ls-pw" class="ifield" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:9px" onclick="doLogin()">
        <i class="ti ti-login"></i> ログイン</button>
    </div>
  </div>
</div>

<!-- メイン -->
<div id="main-screen" style="display:none">
  <div class="nav">
    <div class="nav-title"><i class="ti ti-clock"></i><span>タイムカード</span></div>
    <div class="nav-right">
      <span id="nav-site" class="badge"></span>
      <span id="nav-name" style="font-size:13px;font-weight:500;color:var(--color-text-primary)"></span>
      <span id="nav-role" class="badge"></span>
      <button class="btn" style="padding:5px 10px;font-size:12px" onclick="doLogout()"><i class="ti ti-logout"></i> ログアウト</button>
    </div>
  </div>
  <div style="padding:6px 20px 0;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary)">
    <div class="tab-bar" style="display:inline-flex">
      <button class="tab active" onclick="showTab('punch')"><i class="ti ti-fingerprint"></i> 打刻</button>
      <button class="tab" onclick="showTab('history')"><i class="ti ti-calendar"></i> 履歴</button>
      <button class="tab" onclick="showTab('report')"><i class="ti ti-chart-bar"></i> 集計</button>
      <button class="tab" id="realtime-tab" style="display:none" onclick="showTab('realtime')"><i class="ti ti-radio"></i> 状況</button>
      <button class="tab" id="company-tab" style="display:none" onclick="showTab('company')"><i class="ti ti-building"></i> 全社</button>
      <button class="tab" id="matrix-tab" style="display:none" onclick="showTab('matrix')"><i class="ti ti-table"></i> 勤務表</button>
      <button class="tab" id="admin-tab" style="display:none" onclick="showTab('admin')"><i class="ti ti-settings"></i> 管理</button>
    </div>
  </div>
  <div class="content">

    <!-- 打刻 -->
    <div id="tab-punch">
      <div class="time-big" id="clock"></div>
      <div style="text-align:center;font-size:12px;color:var(--color-text-secondary);margin-bottom:12px" id="datestr"></div>
      <div id="notice-area"></div>
      <div class="card">
        <div class="row" style="margin-bottom:10px">
          <span style="font-size:13px;font-weight:500" id="status-txt"></span>
          <span style="font-size:12px;color:var(--color-text-secondary)" id="elapsed-txt"></span>
        </div>
        <div class="stat-grid">
          <div class="stat"><div class="stat-label">出勤</div><div class="stat-val" id="s-in">--:--</div><div class="stat-sub" id="s-in-date"></div></div>
          <div class="stat"><div class="stat-label">休憩</div><div class="stat-val" id="s-brk">0分</div></div>
          <div class="stat"><div class="stat-label">実働</div><div class="stat-val" id="s-work">0:00</div></div>
        </div>
        <div id="night-notice" style="display:none" class="notice n-warn">
          <i class="ti ti-moon"></i> 夜勤シフト（18:00〜翌9:00）— 深夜割増 22:00〜5:00 を自動計算
        </div>
      </div>
      <div class="punch-grid">
        <button class="punch-btn p-in" id="b-in" onclick="punchIn()"><i class="ti ti-login"></i> 出勤</button>
        <button class="punch-btn p-out" id="b-out" onclick="punchOut()"><i class="ti ti-logout"></i> 退勤</button>
      </div>
      <div class="punch-grid">
        <button class="punch-btn p-brk" id="b-brk" onclick="punchBreak()"><i class="ti ti-coffee"></i> 休憩開始</button>
        <button class="punch-btn p-res" id="b-res" onclick="punchResume()"><i class="ti ti-player-play"></i> 休憩終了</button>
      </div>
    </div>

    <!-- 履歴 -->
    <div id="tab-history" style="display:none">
      <div class="row" style="margin-bottom:12px">
        <div class="sec" style="margin:0">勤務履歴</div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <input type="month" id="hist-month" class="ifield" style="width:auto;padding:5px 9px" onchange="renderHistory()">
          <button class="btn" onclick="openEdit()"><i class="ti ti-edit"></i> 修正</button>
        </div>
      </div>
      <div id="hist-filters" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px"></div>
      <div class="card" style="padding:0;overflow:hidden;overflow-x:auto">
        <table class="tbl">
          <thead><tr><th>日付</th><th>出勤</th><th>退勤</th><th>休憩</th><th>実働</th><th>深夜</th><th></th><th id="hist-loc-th" style="display:none">出勤位置</th><th id="hist-loc-th2" style="display:none">退勤位置</th></tr></thead>
          <tbody id="hist-body"></tbody>
        </table>
      </div>
    </div>

    <!-- 個人集計 -->
    <div id="tab-report" style="display:none">
      <div class="row" style="margin-bottom:12px">
        <div class="sec" style="margin:0">月次集計</div>
        <input type="month" id="rep-month" class="ifield" style="width:auto;padding:5px 9px" onchange="renderReport()">
      </div>
      <div id="rep-filters" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px"></div>
      <div id="rep-content"></div>
    </div>

    <!-- リアルタイム打刻状況 -->
    <div id="tab-realtime" style="display:none">
      <div class="row" style="margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <div class="sec" style="margin:0"><i class="ti ti-radio"></i> リアルタイム打刻状況</div>
        <div style="display:flex;gap:6px;align-items:center">
          <span id="realtime-clock" style="font-size:13px;font-weight:500;color:var(--color-text-secondary);font-family:var(--font-mono)"></span>
          <button class="btn" onclick="refreshFromServer(thisMonth, renderRealtime)"><i class="ti ti-refresh"></i> 更新</button>
        </div>
      </div>
      <div id="realtime-content"></div>
    </div>

    <!-- 全社集計 -->
    <div id="tab-company" style="display:none">
      <div class="row" style="margin-bottom:12px">
        <div class="sec" style="margin:0"><i class="ti ti-building"></i> 全社集計</div>
        <input type="month" id="comp-month" class="ifield" style="width:auto;padding:5px 9px" onchange="renderCompany()">
      </div>
      <div id="company-content"></div>
    </div>

    <!-- 勤務表 -->
    <div id="tab-matrix" style="display:none">
      <div class="row" style="margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <div class="sec" style="margin:0"><i class="ti ti-table"></i> 勤務表</div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <input type="month" id="matrix-month" class="ifield" style="width:auto;padding:5px 9px" onchange="renderMatrix()">
          <select id="matrix-site" class="ifield" style="width:auto;padding:5px 9px;cursor:pointer" onchange="renderMatrix()">
            <option value="all">全事業所</option>
          </select>
        </div>
      </div>
      <div class="legend">
        <div class="leg-item"><div class="leg-box" style="background:#E6F1FB;border:0.5px solid #185FA5"></div>日勤</div>
        <div class="leg-item"><div class="leg-box" style="background:#EEEDFE;border:0.5px solid #533AB7"></div>夜勤</div>
        <div class="leg-item"><div class="leg-box" style="background:var(--color-background-secondary)"></div>休日/記録なし</div>
        <span style="font-size:11px;color:var(--color-text-secondary)">※ 数字は実働時間（小数時間）</span>
      </div>
      <div id="matrix-content"></div>
    </div>

    <!-- 管理 -->
    <div id="tab-admin" style="display:none">
      <div id="admin-area"></div>
    </div>
  </div>
</div>

<!-- 修正モーダル -->
<div id="edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.38);align-items:flex-start;justify-content:center;z-index:200;padding-top:28px;overflow-y:auto">
  <div style="background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.25rem;width:420px;max-width:96vw;margin-bottom:30px">
    <div class="row" style="margin-bottom:14px">
      <span style="font-size:14px;font-weight:500">打刻修正</span>
      <button class="btn" style="padding:3px 8px" onclick="closeEdit()"><i class="ti ti-x"></i></button>
    </div>
    <div id="edit-note" class="notice n-info" style="display:none;margin-bottom:10px"></div>
    <div style="display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:90px"><label>事業所</label><select id="edit-site" class="ifield" style="cursor:pointer" onchange="onEditSite()"></select></div>
      <div style="flex:1;min-width:90px"><label>職員</label><select id="edit-user" class="ifield" style="cursor:pointer"></select></div>
    </div>
    <div style="display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:110px"><label>出勤日</label><input type="date" id="edit-in-date" class="ifield" onchange="loadCurrentRecord()"></div>
      <div style="flex:1;min-width:90px"><label>出勤時刻</label><input type="time" id="edit-in-time" class="ifield"></div>
    </div>
    <div style="display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:110px"><label>退勤日</label><input type="date" id="edit-out-date" class="ifield"></div>
      <div style="flex:1;min-width:90px"><label>退勤時刻</label><input type="time" id="edit-out-time" class="ifield"></div>
    </div>
    <div style="display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:110px"><label>休憩時間（分）</label><input type="number" id="edit-break" class="ifield" min="0" max="480" placeholder="例: 60"></div>
      <div style="flex:1;min-width:90px;display:flex;align-items:flex-end">
        <span style="font-size:11px;color:var(--color-text-secondary)">※ 合計休憩時間を分で入力</span>
      </div>
    </div>
    <div id="current-rec-display" style="font-size:11px;color:var(--color-text-secondary);background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:7px 10px;margin-bottom:4px;display:none"></div>

<script>
// =============================================
// Google Apps Script API URL
// =============================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzWHWMLwa7G1zL5MMV1tm7mdU5xhlIQIOJq33FO5hkjFERDGowv2ATOGcghvzjetIG6/exec';

// =============================================
// ユーザーID フォーマット（任意prefix+5桁数字形式）
// 例: A00001, B00003, S00010 など
// =============================================
let userIdPrefix = 'A'; // デフォルトPrefix（管理画面で変更可能）

function fmtUserId(n, prefix){
  let p = prefix || userIdPrefix || 'A';
  return p.toUpperCase() + String(n).padStart(5,'0');
}
function parseUserId(s){
  // 先頭のアルファベットを除いた数値部分を返す
  return parseInt(String(s).replace(/^[A-Za-z]+0*/,'')) || 0;
}
function extractPrefix(s){
  // IDからPrefix部分を抽出 例: "A00001" → "A", "SW00003" → "SW"
  let m = String(s).match(/^([A-Za-z]+)/);
  return m ? m[1].toUpperCase() : 'A';
}

// 職種定数
const EMP_TYPES = {
  'seishain':   {label:'正社員',         soteiHours:8, trackShortage:true},
  'full_part':  {label:'フルタイムパート', soteiHours:8, trackShortage:true},
  'short_part': {label:'短時間パート',    soteiHours:0, trackShortage:false},
};
function empLabel(type){ return EMP_TYPES[type]?.label || type || '—'; }
function trackShortage(type){ return EMP_TYPES[type]?.trackShortage || false; }

// =============================================
// GAS通信
// =============================================
// =============================================
// 位置情報取得
// =============================================
function getLocation() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) { resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({lat: pos.coords.latitude.toFixed(6), lon: pos.coords.longitude.toFixed(6), acc: Math.round(pos.coords.accuracy)}),
      ()   => resolve(null),
      {timeout: 8000, maximumAge: 0}
    );
  });
}

async function gasCall(params) {
  // file://プロトコルでも動作するようno-cors対応
  const url = GAS_URL + '?' + new URLSearchParams(params).toString();
  try {
    const res = await fetch(url, {redirect: 'follow'});
    const text = await res.text();
    return JSON.parse(text);
  } catch(e) {
    // file://環境ではJSONPにフォールバック
    return await gasCallJsonp(params);
  }
}

function gasCallJsonp(params) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    const script = document.createElement('script');
    const p = {...params, callback: cbName};
    const url = GAS_URL + '?' + new URLSearchParams(p).toString();
    let done = false;
    window[cbName] = (data) => {
      done = true;
      delete window[cbName];
      document.head.removeChild(script);
      resolve(data);
    };
    script.onerror = () => {
      if(!done){ done=true; delete window[cbName]; reject(new Error('JSONP error')); }
    };
    setTimeout(()=>{ if(!done){ done=true; delete window[cbName]; reject(new Error('JSONP timeout')); }}, 15000);
    script.src = url;
    document.head.appendChild(script);
  });
}

function showSync(msg) {
  const bar = document.getElementById('sync-bar');
  document.getElementById('sync-msg').textContent = msg;
  bar.style.display = 'flex';
}
function hideSync() {
  setTimeout(() => document.getElementById('sync-bar').style.display = 'none', 1500);
}

// =============================================
// データ
// =============================================
const SITE_COLORS = ['#185FA5','#3B6D11','#854F0B','#533AB7','#993556'];
let sites = [];
let users = [];
let records = {}; // uid_date -> record object
let recordsLoadedMonths = new Set(); // ロード済み月のキャッシュ
let nextSiteId = 1;
let nextUserId = 1;
let cu = null;
let realtimeTimer = null;
let histUid, repUid, pwTargetId, pwMode;

const _today = new Date();
const todayStr = _today.toISOString().slice(0,10);
const thisMonth = todayStr.slice(0,7);
const DOW = ['日','月','火','水','木','金','土'];

// =============================================
// 初期ロード
// =============================================
async function initLoad() {
  document.getElementById('loading').style.display = 'flex';
  try {
    const data = await gasCall({action:'getAll'});
    // sites
    if (data.sites && data.sites.length) {
      sites = data.sites.map(s => ({...s, id: Number(s.id)}));
      nextSiteId = Math.max(...sites.map(s=>s.id)) + 1;
    } else {
      // 初回: デフォルト事業所を作成
      await addSiteToGas('本社', '#185FA5');
      const data2 = await gasCall({action:'getAll'});
      sites = data2.sites.map(s => ({...s, id: Number(s.id)}));
      nextSiteId = Math.max(...sites.map(s=>s.id)) + 1;
    }
    // users
    if (data.users && data.users.length) {
      users = data.users.map(u => ({
        ...u,
        id: parseUserId(u.id),         // A00001 → 1 として内部管理
        rawId: String(u.id),           // 表示用に元の文字列も保持
        prefix: extractPrefix(u.id),   // アルファベット部分を保持
        siteId: Number(u.siteId),
        employmentType: u.employmentType || 'seishain'
      }));
      nextUserId = Math.max(...users.map(u=>u.id)) + 1;
    }
    // records
    if (data.records && data.records.length) {
      data.records.forEach(r => {
        // recordsのidキーをA形式→数値変換して内部キーを統一
        let recUid = parseUserId(r.userId);
        let recKey = recUid + '_' + r.inDate;
        records[recKey] = {
          inDate: r.inDate,
          inTs: r.inTs ? Number(r.inTs) : null,
          outDate: r.outDate || r.inDate,
          outTs: r.outTs ? Number(r.outTs) : null,
          breaks: r.breaks ? JSON.parse(String(r.breaks||'[]')) : [],
          breakStart: r.breakStart ? Number(r.breakStart) : null,
          inLat:  r.inLat  || null,
          inLon:  r.inLon  || null,
          outLat: r.outLat || null,
          outLon: r.outLon || null,
        };
      });
    }
  } catch(e) {
    showNoticeGlobal('データの読み込みに失敗しました。インターネット接続を確認してください。', 'err');
  }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('login-screen').style.display = 'block';
  initLoginSelects();
}

// =============================================
// ユーティリティ
// =============================================
function fmt2(n){return String(n).padStart(2,'0')}
function timeStr(ts){if(!ts)return'--:--';let d=new Date(ts);return fmt2(d.getHours())+':'+fmt2(d.getMinutes())}
function fmtMins(m){if(m<=0)return'0分';if(m<60)return m+'分';return Math.floor(m/60)+'h'+fmt2(m%60)}
function fmtWork(m){if(m<=0)return'0:00';return Math.floor(m/60)+':'+fmt2(m%60)}
function getRec(uid,inDate){
  let k=uid+'_'+inDate;
  if(!records[k])records[k]={inDate,inTs:null,outDate:inDate,outTs:null,breaks:[],breakStart:null};
  return records[k];
}
function brkMins(r){let t=r.breaks.reduce((s,b)=>s+b,0);if(r.breakStart)t+=Math.floor((Date.now()-r.breakStart)/60000);return t}
// 15分単位丸め: 出勤は切り上げ、退勤は切り捨て
function roundIn15(ts){
  if(!ts)return ts;
  let d=new Date(ts);
  let mins=d.getHours()*60+d.getMinutes();
  let rounded=Math.ceil(mins/15)*15; // 切り上げ
  let diff=(rounded-mins)*60000;
  return ts+diff;
}
function roundOut15(ts){
  if(!ts)return ts;
  let d=new Date(ts);
  let mins=d.getHours()*60+d.getMinutes();
  let rounded=Math.floor(mins/15)*15; // 切り捨て
  let diff=(rounded-mins)*60000;
  return ts+diff;
}
function workMins(r){
  if(!r.inTs)return 0;
  let inTs=roundIn15(r.inTs);
  let outTs=r.outTs?roundOut15(r.outTs):Date.now();
  return Math.max(0,Math.floor((outTs-inTs)/60000)-brkMins(r));
}
function calcMidnightMins(inTs,outTs){
  if(!inTs||!outTs)return 0;
  let total=0,cur=inTs;
  while(cur<outTs){
    let d=new Date(cur);
    let dayStart=new Date(d.getFullYear(),d.getMonth(),d.getDate());
    let mn22=new Date(dayStart);mn22.setHours(22,0,0,0);
    let mn05a=new Date(dayStart);mn05a.setHours(5,0,0,0);
    let mn00=new Date(dayStart);mn00.setHours(0,0,0,0);
    let s1=Math.max(cur,mn00.getTime()),e1=Math.min(outTs,mn05a.getTime());
    if(e1>s1)total+=Math.floor((e1-s1)/60000);
    let s2=Math.max(cur,mn22.getTime()),e2=Math.min(outTs,new Date(dayStart.getTime()+24*3600000).getTime());
    if(e2>s2)total+=Math.floor((e2-s2)/60000);
    cur=new Date(dayStart.getTime()+24*3600000).getTime();
  }
  return total;
}
function midnightMins(r){if(!r.inTs||!r.outTs)return 0;return calcMidnightMins(r.inTs,r.outTs)}
function isNightShift(r){if(!r.inTs)return false;return new Date(r.inTs).getHours()>=17;}
function isNight(r){return r.outDate&&r.outDate!==r.inDate}
function siteById(id){return sites.find(s=>s.id===id)}
function usersInSite(sid){return users.filter(u=>u.siteId===sid)}
function getTodayRec(uid){
  let r=records[uid+'_'+todayStr];if(r&&r.inTs)return r;
  // 前日（夜勤で日をまたいでいる場合）
  let prev=new Date(_today);prev.setDate(_today.getDate()-1);
  let ps=prev.toISOString().slice(0,10);
  let rp=records[uid+'_'+ps];if(rp&&rp.inTs&&!rp.outTs)return rp;
  return getRec(uid,todayStr);
}

// 月初の場合は前月データも取得
async function ensurePrevMonthIfNeeded(){
  let d=_today.getDate();
  if(d<=1){
    let prev=new Date(_today.getFullYear(),_today.getMonth()-1,1);
    let pm=prev.getFullYear()+'-'+fmt2(prev.getMonth()+1);
    await loadMonthRecords(pm, false);
  }
}
function henkeiSoteiMins(year,month){return Math.floor(new Date(year,month,0).getDate()*8*60*40/7)}
function calcMonthStats(uid,year,month){
  let days=new Date(year,month,0).getDate();
  let sotei=henkeiSoteiMins(year,month);
  let totalWork=0,totalMidnight=0,workDays=0,nightDays=0,lateCount=0,dailyArr=[];
  for(let d=1;d<=days;d++){
    let ds=year+'-'+fmt2(month)+'-'+fmt2(d);
    let r=records[uid+'_'+ds];
    if(!r||!r.inTs){dailyArr.push({d,work:0,midnight:0,night:false,r:null});continue;}
    workDays++;let wm=workMins(r);let mm=midnightMins(r);
    totalWork+=wm;totalMidnight+=mm;
    let ng=isNightShift(r);if(ng)nightDays++;
    let dt=new Date(r.inTs);if(!ng&&(dt.getHours()>9||(dt.getHours()===9&&dt.getMinutes()>0)))lateCount++;
    dailyArr.push({d,work:wm,midnight:mm,night:ng,r});
  }
  let overtime=Math.max(0,totalWork-sotei);
  let shortage=Math.max(0,sotei-totalWork);
  return{sotei,totalWork,totalMidnight,overtime,shortage,workDays,nightDays,lateCount,dailyArr};
}

// =============================================
// GAS書き込み
// =============================================
async function saveRecordToGas(uid, inDate) {
  let r = records[uid+'_'+inDate];
  if (!r) return;
  showSync('打刻を保存中...');
  try {
    await gasCall({
      action: 'saveRecord',
      userId: fmtUserId(uid, users.find(u=>u.id===uid)?.prefix),
      inDate: r.inDate,
      inTs: r.inTs || '',
      outDate: r.outDate || inDate,
      outTs: r.outTs || '',
      breaks: JSON.stringify(r.breaks || []),
      breakStart: r.breakStart || '',
      inLat:  r.inLat  || '',
      inLon:  r.inLon  || '',
      outLat: r.outLat || '',
      outLon: r.outLon || '',
    });
    document.getElementById('sync-msg').textContent = '保存しました ✓';
  } catch(e) {
    document.getElementById('sync-msg').textContent = '保存失敗 - オフライン?';
  }
  hideSync();
}

async function addSiteToGas(name, color) {
  const id = nextSiteId++;

  sites.push({id, name, color});

}

async function saveUserToGas(userData) {
  showSync('職員情報を保存中...');
  try {
    // IDをA形式に変換して送信
  const sendData = {...userData, id: fmtUserId(userData.id, userData.prefix), employmentType: userData.employmentType || 'seishain'};
  await gasCall({action:'saveUser', ...sendData});
    document.getElementById('sync-msg').textContent = '保存しました ✓';
  } catch(e) {
    document.getElementById('sync-msg').textContent = '保存失敗';
  }
  hideSync();
}

// =============================================
// 月別レコード取得（遅延ロード）
// =============================================
async function loadMonthRecords(yearMonth, force=false) {
  if (!force && recordsLoadedMonths.has(yearMonth)) return;
  try {
    if(!force) showSync('勤務データを読み込み中...');
    const data = await gasCall({action:'getRecords', month: yearMonth});
    if (data.records && data.records.length) {
      data.records.forEach(r => {
        let recUid = parseUserId(r.userId);
        let recKey = recUid + '_' + r.inDate;
        let parsed = [];
        try { parsed = JSON.parse(String(r.breaks||'[]')); } catch(e2){ parsed=[]; }
        records[recKey] = {
          inDate:     String(r.inDate),
          inTs:       r.inTs       ? Number(r.inTs)       : null,
          outDate:    r.outDate    ? String(r.outDate)    : String(r.inDate),
          outTs:      r.outTs      ? Number(r.outTs)      : null,
          breaks:     Array.isArray(parsed) ? parsed : [],
          breakStart: r.breakStart ? Number(r.breakStart) : null,
          inLat:      r.inLat      || null,
          inLon:      r.inLon      || null,
          outLat:     r.outLat     || null,
          outLon:     r.outLon     || null,
        };
      });
    }
    recordsLoadedMonths.add(yearMonth);
    if(!force){
      document.getElementById('sync-msg').textContent = '読み込み完了 ✓';
      hideSync();
    }
  } catch(e) {
    if(!force){
      document.getElementById('sync-msg').textContent = '読み込み失敗';
      hideSync();
    }
    console.error('loadMonthRecords error:', e);
  }
}

async function refreshFromServer(yearMonth, renderFn) {
  showSync('最新データを取得中...');
  recordsLoadedMonths.delete(yearMonth);
  await loadMonthRecords(yearMonth, true);
  document.getElementById('sync-msg').textContent = '更新完了 ✓';
  hideSync();
  if(renderFn) renderFn();
}

  cu=null;

// 打刻前にサーバーから当日レコードを取得して同期する
async function syncBeforePunch(){
  recordsLoadedMonths.delete(thisMonth);

  let prev=new Date(_today);prev.setDate(_today.getDate()-1);

function updatePunch(){
  if(!cu)return;
  let r=getTodayRec(cu.id);
  let night=isNightShift(r)&&r.inTs&&!r.outTs;
  document.getElementById('s-in').textContent=timeStr(r.inTs);
  document.getElementById('s-in-date').textContent=r.inTs&&r.inDate!==todayStr?'('+r.inDate+')':'';
  document.getElementById('s-brk').textContent=fmtMins(brkMins(r));
  document.getElementById('s-work').textContent=fmtWork(workMins(r));
  document.getElementById('night-notice').style.display=(isNightShift(r)&&r.inTs)?'block':'none';
  let st=document.getElementById('status-txt'),el=document.getElementById('elapsed-txt');
  let bI=document.getElementById('b-in'),bO=document.getElementById('b-out'),bB=document.getElementById('b-brk'),bR=document.getElementById('b-res');
  if(!r.inTs){st.innerHTML='<span class="sdot dot-off"></span>未出勤';el.textContent='';bI.disabled=false;bO.disabled=true;bB.disabled=true;bR.disabled=true;}
  else if(r.outTs){st.innerHTML='<span class="sdot dot-off"></span>退勤済み';el.textContent='実働 '+fmtWork(workMins(r));bI.disabled=true;bO.disabled=true;bB.disabled=true;bR.disabled=true;}
  else if(r.breakStart){st.innerHTML='<span class="sdot dot-brk"></span>休憩中';el.textContent='休憩 '+Math.floor((Date.now()-r.breakStart)/60000)+'分';bI.disabled=true;bO.disabled=true;bB.disabled=true;bR.disabled=false;}

function showNotice(msg,type){
  let a=document.getElementById('notice-area');
  a.innerHTML=`<div class="notice n-${type||'info'}">${msg}</div>`;
  setTimeout(()=>a.innerHTML='',3500);
}
function showNoticeGlobal(msg,type){
  // ログイン前でも使えるグローバル通知
  alert(msg);
}
async function punchIn(){
  // サーバーから最新状態を取得して二重打刻を防止
  showNotice('確認中...','info');
  await syncBeforePunch();
  let r=getTodayRec(cu.id);
  if(r.inTs&&!r.outTs){showNotice('すでに他の端末で出勤済みです','warn');updatePunch();return;}
  if(r.outTs){showNotice('本日はすでに退勤済みです','warn');updatePunch();return;}
  let nr=getRec(cu.id,todayStr);
  nr.inTs=Date.now();nr.inDate=todayStr;nr.outDate=todayStr;
  showNotice('位置情報を取得中...','info');
  let geo=await getLocation();
  if(geo){nr.inLat=geo.lat;nr.inLon=geo.lon;nr.inAcc=geo.acc;}
  let h=new Date().getHours();
  showNotice('出勤しました！'+(h>=17?' 🌙 夜勤シフト':'')+(geo?' 📍'+geo.lat+','+geo.lon:''),'ok');
  await saveRecordToGas(cu.id, todayStr);
  updatePunch();
}
async function punchOut(){
  // 退勤前にサーバーから最新レコードを取得（他端末で出勤している場合に対応）
  showNotice('最新データを確認中...','info');
  await syncBeforePunch();
  let r=getTodayRec(cu.id);
  if(!r.inTs){showNotice('出勤記録がありません。先に出勤してください。','warn');updatePunch();return;}
  if(r.outTs){showNotice('すでに退勤済みです','warn');updatePunch();return;}
  if(r.breakStart){r.breaks.push(Math.floor((Date.now()-r.breakStart)/60000));r.breakStart=null;}
  r.outTs=Date.now();r.outDate=new Date().toISOString().slice(0,10);
  showNotice('位置情報を取得中...','info');
  let geo=await getLocation();
  if(geo){r.outLat=geo.lat;r.outLon=geo.lon;r.outAcc=geo.acc;}
  let mn=midnightMins(r);
  showNotice('退勤しました！'+(mn>0?' 深夜: '+fmtMins(mn):'')+(geo?' 📍'+geo.lat+','+geo.lon:''),'ok');
  await saveRecordToGas(cu.id, r.inDate);
  updatePunch();
}
async function punchBreak(){
  showNotice('確認中...','info');
  await syncBeforePunch();
  let r=getTodayRec(cu.id);
  if(!r.inTs){showNotice('出勤記録がありません','warn');updatePunch();return;}
  if(r.outTs){showNotice('すでに退勤済みです','warn');updatePunch();return;}
  if(r.breakStart){showNotice('すでに休憩中です','warn');updatePunch();return;}
  r.breakStart=Date.now();
  showNotice('休憩開始','info');
  await saveRecordToGas(cu.id, r.inDate);
  updatePunch();
}
async function punchResume(){
  showNotice('確認中...','info');
  await syncBeforePunch();
  let r=getTodayRec(cu.id);
  if(!r.inTs){showNotice('出勤記録がありません','warn');updatePunch();return;}
  if(!r.breakStart){showNotice('休憩中ではありません','warn');updatePunch();return;}
  r.breaks.push(Math.floor((Date.now()-r.breakStart)/60000));
  r.breakStart=null;
  showNotice('休憩終了','info');
  await saveRecordToGas(cu.id, r.inDate);
  updatePunch();
}

function renderHistory(){
  let m=document.getElementById('hist-month').value||thisMonth;
  let lth=document.getElementById('hist-loc-th');let lth2=document.getElementById('hist-loc-th2');
  if(lth){lth.style.display=cu.role==='admin'?'':'none';}
  if(lth2){lth2.style.display=cu.role==='admin'?'':'none';}
  let [y,mo]=m.split('-').map(Number);
  let days=new Date(y,mo,0).getDate();let rows='';
  for(let d=1;d<=days;d++){
    let ds=y+'-'+fmt2(mo)+'-'+fmt2(d);
    let r=records[histUid+'_'+ds];if(!r||!r.inTs)continue;
    let ng=isNightShift(r);let mn=midnightMins(r);
    let showLoc=cu.role==='admin';
    let inLocCell=showLoc?(r.inLat?`<td><a href="https://maps.google.com/?q=${r.inLat},${r.inLon}" target="_blank" style="font-size:10px;color:#185FA5" onclick="event.stopPropagation()">📍${r.inLat},${r.inLon}</a></td>`:'<td style="color:var(--color-text-tertiary)">—</td>'):'';
    let outLocCell=showLoc?(r.outLat?`<td><a href="https://maps.google.com/?q=${r.outLat},${r.outLon}" target="_blank" style="font-size:10px;color:#3B6D11" onclick="event.stopPropagation()">📍${r.outLat},${r.outLon}</a></td>`:'<td style="color:var(--color-text-tertiary)">—</td>'):'';
    // 丸め後の時刻
    let inRounded=roundIn15(r.inTs);
    let outRounded=r.outTs?roundOut15(r.outTs):null;
    let inChanged=inRounded!==r.inTs;
    let outChanged=outRounded!==r.outTs;
    rows+=`<tr style="cursor:pointer" onclick="openEditForRecord(${histUid},'${ds}')" title="クリックして修正">
      <td>${mo}/${d}${ng?'<span class="night-badge">夜勤</span>':''}</td>
      <td>
        ${timeStr(r.inTs)}
        ${inChanged?`<span style="font-size:9px;color:var(--color-text-secondary)">→${timeStr(inRounded)}</span>`:''}
      </td>
      <td>
        ${timeStr(r.outTs)}${isNight(r)?'<span class="night-badge">翌</span>':''}
        ${outChanged&&r.outTs?`<span style="font-size:9px;color:var(--color-text-secondary)">→${timeStr(outRounded)}</span>`:''}
      </td>
      <td>${fmtMins(brkMins(r))}</td>
      <td>${fmtWork(workMins(r))}</td>
      <td style="${mn>0?'color:#533AB7;font-weight:500':''}">${mn>0?fmtMins(mn):'—'}</td>
      <td style="color:var(--color-text-tertiary);font-size:11px"><i class="ti ti-pencil"></i></td>
      ${inLocCell}${outLocCell}
    </tr>`;
  }
  document.getElementById('hist-body').innerHTML=rows||'<tr><td colspan="7" style="text-align:center;color:var(--color-text-secondary);padding:18px">記録なし</td></tr>';
}

        ${doShortage && st.shortage>0

function renderRealtime(){
  let now = new Date();
  document.getElementById('realtime-clock').textContent =
    fmt2(now.getHours())+':'+fmt2(now.getMinutes())+':'+fmt2(now.getSeconds())+' 現在';

  // 状態カテゴリ分類
  let working=[], onBreak=[], finished=[], notYet=[];

  users.forEach(u=>{
    let r = getTodayRec(u.id);
    let site = siteById(u.siteId);
    let info = {u, r, site};
    if(!r.inTs)            notYet.push(info);
    else if(r.outTs)       finished.push(info);
    else if(r.breakStart)  onBreak.push(info);
    else                   working.push(info);
  });

  // カードHTML生成
  function userCard(info, statusDot, statusLabel, extraInfo){
    let {u,r,site}=info;
    let wm=workMins(r);
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary)">
      <span style="width:10px;height:10px;border-radius:50%;background:${statusDot};flex-shrink:0"></span>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-size:13px;font-weight:500">${u.name}</span>
          <span style="font-size:10px;color:var(--color-text-secondary);background:var(--color-background-secondary);padding:1px 6px;border-radius:10px">${fmtUserId(u.id,u.prefix)}</span>
          <span style="font-size:10px;color:${site?.color||'#888'};background:${site?.color||'#888'}18;padding:1px 6px;border-radius:10px">${site?.name||'—'}</span>
        </div>
        <div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px">${extraInfo}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:12px;font-weight:500;color:var(--color-text-primary)">${statusLabel}</div>
        ${wm>0?`<div style="font-size:11px;color:var(--color-text-secondary)">実働 ${fmtWork(wm)}</div>`:''}
      </div>
    </div>`;
  }

  function sectionHtml(title, color, icon, items, cardFn){
    if(!items.length) return '';
    return `<div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="width:10px;height:10px;border-radius:50%;background:${color}"></span>
        <span style="font-size:13px;font-weight:500">${title}</span>
        <span style="font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);padding:1px 8px;border-radius:10px">${items.length}名</span>
      </div>
      ${items.map(cardFn).join('')}
    </div>`;
  }

  // 勤務中（緑）
  let workingHtml = sectionHtml('勤務中','#639922','dot-in',working,info=>{
    let elapsed=Math.floor((Date.now()-info.r.inTs)/60000);
    return userCard(info,'#639922','勤務中',
      `出勤 ${timeStr(info.r.inTs)}　経過 ${fmtWork(elapsed)}`);
  });

  // 休憩中（オレンジ）
  let breakHtml = sectionHtml('休憩中','#BA7517','dot-brk',onBreak,info=>{
    let bElapsed=info.r.breakStart?Math.floor((Date.now()-info.r.breakStart)/60000):0;
    return userCard(info,'#BA7517','休憩中',
      `出勤 ${timeStr(info.r.inTs)}　休憩 ${bElapsed}分経過`);
  });

  // 退勤済（グレー）
  let finishedHtml = sectionHtml('退勤済み','#888780','dot-off',finished,info=>{
    return userCard(info,'#888780','退勤済み',
      `出勤 ${timeStr(info.r.inTs)}　退勤 ${timeStr(info.r.outTs)}`);
  });

  // 未出勤（グレー薄）
  let notYetHtml = sectionHtml('未出勤','#D3D1C7','dot-off',notYet,info=>{
    return userCard(info,'#D3D1C7','未出勤','');
  });

  // サマリーバー
  let total=users.length;
  let wPct=total?Math.round(working.length/total*100):0;
  let bPct=total?Math.round(onBreak.length/total*100):0;
  let fPct=total?Math.round(finished.length/total*100):0;

  let summaryHtml=`<div class="card" style="margin-bottom:10px">
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px">
      <div class="stat" style="flex:1;min-width:80px"><div class="stat-label">勤務中</div><div class="stat-val" style="color:#639922">${working.length}</div></div>
      <div class="stat" style="flex:1;min-width:80px"><div class="stat-label">休憩中</div><div class="stat-val" style="color:#BA7517">${onBreak.length}</div></div>
      <div class="stat" style="flex:1;min-width:80px"><div class="stat-label">退勤済み</div><div class="stat-val">${finished.length}</div></div>
      <div class="stat" style="flex:1;min-width:80px"><div class="stat-label">未出勤</div><div class="stat-val" style="color:var(--color-text-secondary)">${notYet.length}</div></div>
    </div>
    <div style="height:8px;border-radius:4px;background:var(--color-background-secondary);overflow:hidden;display:flex">
      <div style="width:${wPct}%;background:#639922;transition:width 0.3s"></div>
      <div style="width:${bPct}%;background:#BA7517;transition:width 0.3s"></div>
      <div style="width:${fPct}%;background:#D3D1C7;transition:width 0.3s"></div>
    </div>
    <div style="font-size:10px;color:var(--color-text-secondary);margin-top:4px;text-align:right">30秒ごとに自動更新</div>
  </div>`;

  document.getElementById('realtime-content').innerHTML =
    summaryHtml + workingHtml + breakHtml + finishedHtml + notYetHtml;
}

function renderMatrix(){
  let m=document.getElementById('matrix-month').value||thisMonth;
  let [y,mo]=m.split('-').map(Number);
  let days=new Date(y,mo,0).getDate();
  let siteFilter=document.getElementById('matrix-site').value;
  let targetUsers=siteFilter==='all'?[...users].sort((a,b)=>a.siteId-b.siteId||a.id-b.id):users.filter(u=>u.siteId===parseInt(siteFilter));
  let sotei=henkeiSoteiMins(y,mo);

  let dCols='<th class="col-name corner">職員名</th>';
  for(let d=1;d<=days;d++){
    let ds=y+'-'+fmt2(mo)+'-'+fmt2(d);
    let dow=new Date(ds).getDay();
    let isToday=ds===todayStr;
    dCols+=`<th class="th-date row-header ${dow===0||dow===6?'weekend':''} ${isToday?'today-col':''}">${d}<br><span style="font-size:9px">${DOW[dow]}</span></th>`;
  }
  dCols+='<th class="th-date row-header col-total">合計<br><span style="font-size:9px">h</span></th>';
  dCols+='<th class="th-date row-header col-total">夜勤<br><span style="font-size:9px">回</span></th>';

  let colDayTotals=new Array(days).fill(0);
  let rows='';
  let prevSiteId=null;

  targetUsers.forEach(u=>{
    let st=calcMonthStats(u.id,y,mo);
    let site=siteById(u.siteId);
    if(siteFilter==='all'&&u.siteId!==prevSiteId){
      prevSiteId=u.siteId;
      rows+=`<tr><td colspan="${days+3}" style="background:${site.color}18;color:${site.color};font-weight:500;font-size:11px;padding:4px 10px;border:0.5px solid var(--color-border-tertiary)"><span style="width:8px;height:8px;border-radius:50%;background:${site.color};display:inline-block;margin-right:6px"></span>${site.name}</td></tr>`;
    }
    let cells='';
    let userMonthWork=0;
    st.dailyArr.forEach((x,i)=>{
      let ds=y+'-'+fmt2(mo)+'-'+fmt2(i+1);
      let dow=new Date(ds).getDay();
      let isToday=ds===todayStr;
      if(!x.work){
        cells+=`<td style="${isToday?'outline:1.5px solid var(--color-text-info);outline-offset:-1px;':''}"><div class="matrix-cell ${dow===0||dow===6?'cell-holiday':'cell-empty'}">${dow===0||dow===6?'休':'—'}</div></td>`;
      } else {
        userMonthWork+=x.work;colDayTotals[i]+=x.work;
        let hrs=(x.work/60).toFixed(1);
        cells+=`<td title="${x.night?'夜勤':'日勤'}: ${fmtWork(x.work)}" style="${isToday?'outline:1.5px solid var(--color-text-info);outline-offset:-1px;':''}"><div class="matrix-cell ${x.night?'cell-night':'cell-normal'}">${hrs}</div></td>`;
      }
    });
    let isOT=userMonthWork>sotei;
    rows+=`<tr><td class="col-name">${u.name}</td>${cells}<td class="col-total"><div class="matrix-cell" style="${isOT?'color:var(--color-text-danger);font-weight:600':''}">${(userMonthWork/60).toFixed(1)}</div></td><td class="col-total"><div class="matrix-cell" style="${st.nightDays>0?'color:#533AB7;font-weight:600':''}">${st.nightDays>0?st.nightDays:'—'}</div></td></tr>`;
  });

  let totalCells='',grandTotal=0;
  for(let i=0;i<days;i++){
    grandTotal+=colDayTotals[i];
    totalCells+=`<td class="col-total"><div class="matrix-cell" style="font-size:10px">${colDayTotals[i]>0?(colDayTotals[i]/60).toFixed(1):''}</div></td>`;
  }
  rows+=`<tr class="row-total"><td class="col-name" style="position:sticky;left:0;z-index:3">日計(h)</td>${totalCells}<td class="col-total"><div class="matrix-cell" style="font-weight:700">${(grandTotal/60).toFixed(1)}</div></td><td class="col-total"></td></tr>`;

  document.getElementById('matrix-content').innerHTML=`
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:8px">所定: <b>${fmtWork(sotei)}</b>（${y}年${mo}月）　合計が所定を超える職員は赤字</div>
    <div class="matrix-wrap"><table class="matrix-tbl"><thead><tr>${dCols}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

async function doAddSite(){
  let name=document.getElementById('new-site-name').value.trim();
  if(!name){alert('事業所名を入力してください');return;}
  showSync('事業所を追加中...');
  try{
    await addSiteToGas(name,pickedColor);
    document.getElementById('sync-msg').textContent='追加しました ✓';
  }catch(e){document.getElementById('sync-msg').textContent='保存失敗';}
  hideSync();
  initLoginSelects();renderAdmin();
  let ms=document.getElementById('matrix-site');
  if(ms)ms.innerHTML='<option value="all">全事業所</option>'+sites.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}

async function doRemoveSite(sid){
  if(usersInSite(sid).length>0){alert('職員がいます。先に移動または削除してください。');return;}
  if(!confirm('削除しますか？'))return;
  showSync('削除中...');
  try{await gasCall({action:'deleteSite',id:sid});sites=sites.filter(s=>s.id!==sid);document.getElementById('sync-msg').textContent='削除しました ✓';}
  catch(e){document.getElementById('sync-msg').textContent='削除失敗';}
  hideSync();renderAdmin();initLoginSelects();
}

async function doAddUser(sid){
  let n=document.querySelector(`.add-name[data-site="${sid}"]`)?.value.trim();
  let pf=(document.querySelector(`.add-prefix[data-site="${sid}"]`)?.value.trim().toUpperCase())||'A';
  let et=document.querySelector(`.add-emptype[data-site="${sid}"]`)?.value||'seishain';
  let ro=document.querySelector(`.add-role[data-site="${sid}"]`)?.value;
  let pw=document.querySelector(`.add-pw[data-site="${sid}"]`)?.value.trim();
  if(!n){alert('名前を入力してください');return;}
  if(!pw){alert('初期PWを入力してください');return;}
  if(!/^[A-Za-z]{1,3}$/.test(pf)){alert('接頭辞は1〜3文字のアルファベットで入力してください');return;}
  let id=nextUserId++;
  let userData={id,name:n,role:ro,pw,siteId:sid,employmentType:et,prefix:pf};
  userData.rawId=fmtUserId(id,pf);
  users.push(userData);
  await saveUserToGas(userData);
  renderAdmin();initLoginSelects();
}

async function doRemoveUser(uid){
  if(!confirm('削除しますか？'))return;
  showSync('削除中...');
  try{await gasCall({action:'deleteUser',id:uid});users=users.filter(u=>u.id!==uid);document.getElementById('sync-msg').textContent='削除しました ✓';}
  catch(e){document.getElementById('sync-msg').textContent='削除失敗';}
  hideSync();renderAdmin();
}

async function importCsv(){
  let text=document.getElementById('csv-text-input').value;
  if(!text.trim())return;
  let lines=text.trim().split('\n').filter(l=>l.trim());
  let ok=0,errs=[];
  for(let i=0;i<lines.length;i++){
    let parts=lines[i].split(',').map(s=>s.trim());
    if(parts.length<4){errs.push(`行${i+1}:列不足`);continue;}
    let[name,siteName,role,pw]=parts;
    let s=sites.find(x=>x.name===siteName);
    if(!s){errs.push(`行${i+1}:事業所「${siteName}」不明`);continue;}
    if(role!=='admin'&&role!=='staff'){errs.push(`行${i+1}:役割はadmin/staff`);continue;}
    let id=nextUserId++;
    let et=parts[4]||'seishain'; // 5列目に職種オプション
    let userData={id,name,role,pw,siteId:s.id,employmentType:et};
    users.push(userData);
    await saveUserToGas(userData);
    ok++;
  }
  document.getElementById('csv-import-result').innerHTML=`<div class="notice n-${errs.length?'warn':'ok'}">${ok}名登録。${errs.join(' ')}</div>`;
  document.getElementById('csv-text-input').value='';
  renderAdmin();initLoginSelects();
}

async function savePw(){

function _openEditModal(targetUid, date) {
  let m = document.getElementById('edit-modal');

  let ue = document.getElementById('edit-user');
  let note = document.getElementById('edit-note');
  let targetUser = users.find(u => u.id === targetUid);

  if(cu.role === 'admin'){
    se.innerHTML = sites.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');

    se.value = targetUser?.siteId || sites[0]?.id;
    // 職員プルダウンをその事業所の職員で埋める
    let sid = Number(se.value);
    ue.innerHTML = usersInSite(sid).map(u=>`<option value="${u.id}">${u.name}</option>`).join('');
    ue.disabled = false;
    ue.value = targetUid;
    note.textContent = '管理者として全職員の記録を修正・追加できます。';
    note.style.display = 'block';
  } else {
    let s = siteById(cu.siteId);
    se.innerHTML = `<option value="${s?.id}">${s?.name}</option>`;
    se.disabled = true;
    ue.innerHTML = `<option value="${cu.id}">${cu.name}</option>`;
    ue.disabled = true;
    note.innerHTML = '<i class="ti ti-info-circle"></i> 自分の記録のみ修正・追加できます。';
    note.style.display = 'block';
  }

  document.getElementById('edit-in-date').value = date;
  document.getElementById('edit-out-date').value = date;
  document.getElementById('edit-in-time').value = '';
  document.getElementById('edit-out-time').value = '';
  document.getElementById('edit-break').value = '';
  document.getElementById('current-rec-display').style.display = 'none';

  m.style.display = 'flex';
  // 既存レコードがあれば自動ロード
  loadCurrentRecord();
}

function loadCurrentRecord(){
  let uid=parseInt(document.getElementById('edit-user').value||cu.id);
  let date=document.getElementById('edit-in-date').value;
  if(!date)return;
  // 退勤日を出勤日と同じにデフォルト設定
  document.getElementById('edit-out-date').value=date;
  let r=records[uid+'_'+date];
  let disp=document.getElementById('current-rec-display');
  if(r&&r.inTs){
    // 既存の記録をフォームにセット
    let inDt=new Date(r.inTs);
    let inH=String(inDt.getHours()).padStart(2,'0'),inM=String(inDt.getMinutes()).padStart(2,'0');
    document.getElementById('edit-in-time').value=inH+':'+inM;
    if(r.outTs){
      let outDt=new Date(r.outTs);
      let outH=String(outDt.getHours()).padStart(2,'0'),outM=String(outDt.getMinutes()).padStart(2,'0');
      document.getElementById('edit-out-time').value=outH+':'+outM;
      document.getElementById('edit-out-date').value=r.outDate||date;
    }
    // 休憩時間を分で表示（breaks配列の合計）
    let totalBrk=r.breaks?r.breaks.reduce((s,b)=>s+b,0):0;
    document.getElementById('edit-break').value=totalBrk||'';
    disp.textContent='現在の記録: 出勤 '+timeStr(r.inTs)+(r.outTs?' / 退勤 '+timeStr(r.outTs):'')
      +' / 休憩 '+(totalBrk?totalBrk+'分':'なし')
      +' / 実働 '+fmtWork(workMins(r));
    disp.style.display='block';
  }else{
    document.getElementById('edit-in-time').value='';
    document.getElementById('edit-out-time').value='';
    document.getElementById('edit-break').value='';
    disp.textContent='この日の記録はまだありません';
    disp.style.display='block';
  }
}
function closeEdit(){document.getElementById('edit-modal').style.display='none';}
async function saveEdit(){
  let uid=parseInt(document.getElementById('edit-user').value);
  if(uid!==cu.id&&cu.role!=='admin'){
    alert('他の職員の記録は管理者のみ修正できます');return;
  }
  let inDate=document.getElementById('edit-in-date').value;
  let inTime=document.getElementById('edit-in-time').value;
  let outDate=document.getElementById('edit-out-date').value;
  let outTime=document.getElementById('edit-out-time').value;
  let r=getRec(uid,inDate);
  if(inTime){let[h,mm]=inTime.split(':').map(Number);let d=new Date(inDate);d.setHours(h,mm,0,0);r.inTs=d.getTime();r.inDate=inDate;}else r.inTs=null;
  if(outTime&&outDate){let[h,mm]=outTime.split(':').map(Number);let d=new Date(outDate);d.setHours(h,mm,0,0);r.outTs=d.getTime();r.outDate=outDate;}else{r.outTs=null;r.outDate=inDate;}
  // 休憩時間（分）を上書き
  let brkVal=document.getElementById('edit-break').value;
  if(brkVal!==''){
    let brkMinsVal=parseInt(brkVal)||0;
    r.breaks=[brkMinsVal]; // 合計を1つの値として保存
    r.breakStart=null;
  }
  closeEdit();
  await saveRecordToGas(uid,inDate);
  renderHistory();showNotice('修正しました。','ok');
}

// =============================================
// 起動
// =============================================
initLoad();
</script>
